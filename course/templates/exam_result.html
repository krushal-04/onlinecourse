<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body text-center">
                <h1 class="text-success mb-4">Congratulations!</h1>
                
                <h3 class="mb-3">You have completed the exam for: <strong>{{ course.name }}</strong></h3>
                
                <div class="alert alert-info py-4">
                    <h2 class="display-5">Your Score: {{ correct }} / {{ total }}</h2>
                </div>

                <hr>

                <div class="mt-4">
                    <h5>Exam Result Details:</h5>
                    <p class="text-muted">Your submission has been recorded successfully. Keep up the great work!</p>
                </div>

                <a href="{% url 'course:course_details' course.id %}" class="btn btn-primary mt-3">Back to Course</a>
            </div>
        </div>
    </div>
</body>
</html>
